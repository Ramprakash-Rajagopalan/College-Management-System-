<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - College Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #2a5298; color: white; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        form input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn-edit { background: #4CAF50; }
        .btn-delete { background: #f44336; }
        .action-buttons { display: flex; gap: 8px; }
    </style>
</head>
<body>
    <nav>
        <h2>🎓 College Management System</h2>
        <div>
            <a href="/dashboard">Dashboard</a>
            <a href="/students">Students</a>
            <a href="/login-page">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>👥 Students Management</h2>

        <button onclick="openStudentModal()">➕ Add Student</button>

        <table id="studentTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Department</th>
                    <th>Year</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentBody">
                <tr><td colspan="7" style="text-align:center;">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="studentModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:10px; width:90%; max-width:500px;">
            <h3>Add Student</h3>
            <form id="studentForm">
                <input type="number" placeholder="User ID" required>
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <input type="tel" placeholder="Phone">
                <input type="text" placeholder="Department" required>
                <input type="number" placeholder="Year" required>
                <button type="submit">Add Student</button>
            </form>
            <button onclick="closeStudentModal()">Close</button>
        </div>
    </div>

    <script>
        async function loadStudents() {
            try {
                const response = await fetch('/api/students');
                const students = await response.json();
                
                const tbody = document.getElementById('studentBody');
                tbody.innerHTML = '';
                
                if (students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No students found</td></tr>';
                    return;
                }
                
                students.forEach(s => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${s.id}</td>
                        <td>${s.name}</td>
                        <td>${s.email}</td>
                        <td>${s.phone || '-'}</td>
                        <td>${s.department}</td>
                        <td>${s.year}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-edit">Edit</button>
                                <button class="btn-delete">Delete</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading students:', error);
            }
        }

        function openStudentModal() {
            document.getElementById('studentModal').style.display = 'flex';
        }

        function closeStudentModal() {
            document.getElementById('studentModal').style.display = 'none';
        }

        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const studentData = {
                user_id: document.querySelector('#studentForm input[placeholder="User ID"]').value,
                name: document.querySelector('#studentForm input[placeholder="Name"]').value,
                email: document.querySelector('#studentForm input[placeholder="Email"]').value,
                phone: document.querySelector('#studentForm input[placeholder="Phone"]').value,
                department: document.querySelector('#studentForm input[placeholder="Department"]').value,
                year: document.querySelector('#studentForm input[placeholder="Year"]').value
            };

            try {
                const response = await fetch('/api/students', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(studentData)
                });

                if (response.ok) {
                    alert('Student added successfully!');
                    closeStudentModal();
                    loadStudents();
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        loadStudents();
    </script>
</body>
</html>
