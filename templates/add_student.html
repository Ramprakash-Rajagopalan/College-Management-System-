<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student - College Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav>
        <h2>🎓 College Management System</h2>
        <div>
            <a href="/home">Home</a>
            <a href="/students-page">Students</a>
        </div>
    </nav>

    <div class="container">
        <h2>➕ Add New Student</h2>

        <form id="studentForm">
            <input type="text" id="name" placeholder="Student Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="text" id="department" placeholder="Department (e.g., Computer Science)" required>
            <input type="number" id="year" placeholder="Academic Year (1, 2, 3, 4)" min="1" max="4" required>
            <button type="submit">✓ Add Student</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='css/js/app.js') }}"></script>

</body>
</html>
