<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty - College Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <h2>🎓 College Management System</h2>
        <div>
            <a href="/dashboard">Dashboard</a>
            <a href="/faculty">Faculty</a>
            <a href="/login-page">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>👨‍🏫 Faculty Management</h2>

        <button onclick="openFacultyModal()">➕ Add Faculty</button>

        <table id="facultyTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Department</th>
                    <th>Designation</th>
                    <th>Qualification</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="facultyBody">
                <tr><td colspan="8" style="text-align:center;">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="facultyModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:10px; width:90%; max-width:500px;">
            <h3>Add Faculty</h3>
            <form id="facultyForm">
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <input type="tel" placeholder="Phone" required>
                <input type="text" placeholder="Department" required>
                <input type="text" placeholder="Designation" required>
                <input type="text" placeholder="Qualification" required>
                <button type="submit">Add Faculty</button>
            </form>
            <button onclick="closeFacultyModal()">Close</button>
        </div>
    </div>

    <script>
        async function loadFaculty() {
            try {
                const response = await fetch('/api/faculty');
                const faculty = await response.json();
                
                const tbody = document.getElementById('facultyBody');
                tbody.innerHTML = '';
                
                faculty.forEach(f => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${f.id}</td>
                        <td>${f.name}</td>
                        <td>${f.email}</td>
                        <td>${f.phone}</td>
                        <td>${f.department}</td>
                        <td>${f.designation}</td>
                        <td>${f.qualification}</td>
                        <td>
                            <button class="btn-edit">Edit</button>
                            <button class="btn-delete">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading faculty:', error);
            }
        }

        function openFacultyModal() {
            document.getElementById('facultyModal').style.display = 'flex';
        }

        function closeFacultyModal() {
            document.getElementById('facultyModal').style.display = 'none';
        }

        loadFaculty();
    </script>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #2a5298;
            color: white;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover {
            background: #764ba2;
        }
        form input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</body>
</html>
