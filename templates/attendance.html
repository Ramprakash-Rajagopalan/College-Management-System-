<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - College Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #2a5298; color: white; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        form input, form select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <nav>
        <h2>🎓 College Management System</h2>
        <div>
            <a href="/dashboard">Dashboard</a>
            <a href="/attendance">Attendance</a>
            <a href="/login-page">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>📋 Attendance Management</h2>

        <button onclick="openAttendanceModal()">➕ Mark Attendance</button>

        <table id="attendanceTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Student ID</th>
                    <th>Course ID</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="attendanceBody">
                <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="attendanceModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:10px; width:90%; max-width:400px;">
            <h3>Mark Attendance</h3>
            <form id="attendanceForm">
                <input type="number" placeholder="Student ID" required>
                <input type="number" placeholder="Course ID" required>
                <input type="date" required>
                <select required>
                    <option>Select Status</option>
                    <option value="present">Present</option>
                    <option value="absent">Absent</option>
                    <option value="leave">Leave</option>
                </select>
                <button type="submit">Mark Attendance</button>
            </form>
            <button onclick="closeAttendanceModal()">Close</button>
        </div>
    </div>

    <script>
        async function loadAttendance() {
            try {
                const response = await fetch('/api/attendance');
                const attendance = await response.json();
                
                const tbody = document.getElementById('attendanceBody');
                tbody.innerHTML = '';
                
                attendance.forEach(a => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${a.id}</td>
                        <td>${a.student_id}</td>
                        <td>${a.course_id}</td>
                        <td>${a.attendance_date}</td>
                        <td><span style="background: ${a.status === 'present' ? '#d4edda' : '#f8d7da'}; padding: 5px 10px; border-radius: 3px;">${a.status}</span></td>
                        <td>
                            <button class="btn-edit">Edit</button>
                            <button class="btn-delete">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading attendance:', error);
            }
        }

        function openAttendanceModal() {
            document.getElementById('attendanceModal').style.display = 'flex';
        }

        function closeAttendanceModal() {
            document.getElementById('attendanceModal').style.display = 'none';
        }

        loadAttendance();
    </script>
</body>
</html>
